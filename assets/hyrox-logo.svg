<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 96" role="img" aria-label="HYROX">
  <!-- Inspired by the official HYROX wordmark + H stripe mark (unofficial recreation) -->
  <g fill="#FFFFFF">
    <!-- Left motion bars -->
    <rect x="0" y="18" width="28" height="8"/>
    <rect x="0" y="34" width="36" height="8"/>
    <rect x="0" y="50" width="28" height="8"/>
    <rect x="0" y="66" width="36" height="8"/>
    <!-- H stems -->
    <rect x="44" y="12" width="12" height="72"/>
    <rect x="84" y="12" width="12" height="72"/>
    <!-- H crossbar -->
    <rect x="44" y="44" width="52" height="10"/>
    <!-- Right motion bars -->
    <rect x="104" y="18" width="28" height="8"/>
    <rect x="104" y="34" width="36" height="8"/>
    <rect x="104" y="50" width="28" height="8"/>
    <rect x="104" y="66" width="36" height="8"/>
    <!-- Wordmark -->
    <text x="158" y="68"
      font-family="Arial Black, Helvetica Neue, Arial, sans-serif"
      font-size="58"
      font-weight="900"
      letter-spacing="4">HYROX</text>
  </g>
</svg>
